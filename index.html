<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tédio V2</title>
        <style>
            header{
                text-align: center;
                background-color: rgb(78, 120, 243);
                border: 10px solid royalblue;
                border-radius: 7px;
                padding: 20px;
                margin: 10px auto;
                width: 50%;
            }
            nav{
                text-align: left;
                background-color: lightgray;
                border: 2px solid gray;
                border-radius: 7px;
                padding: 15px;
                margin: 5px 0px;
            }
            article{
                background-color: wheat;
                width: 50%;
                margin: 10px auto;
                border: 10px solid rgb(212, 192, 153);
                border-radius: 7px;
                padding: 20px;
            }
            .pagina{
                background-color: white;
                padding: 10px;
                border: none;
                border-radius: 3px;
                cursor: pointer;
            }
            .pagina:hover{
                background-color: rgb(235, 235, 235);
            }
            div.escritura{
                background-color: white;
                padding: 5px 10px;
                border: none;
                border-radius: 7px;
            }
        </style>
    </head>
    <body style="background-color: black;">
        <header>
            <h1>
                Olá, Bem-Vindo ao meu Site!
            </h1>
            <b>Assuntos variados</b>
            <nav>
                <button class="pagina">
                    <a style="color: black;" href="html/tomar.html">Curiosidade</a>
                </button>
            </nav>
        </header>
        <article>
            <h1>
                Merda Nenhuma
            </h1>
            <div class="escritura">
                <h2>
                    Ideias
                </h2>
                <p>Se tiver Ideia do que devo por aqui, só me procurar</p>
            </div>
        </article>
    </body>
</html>
